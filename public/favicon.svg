<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Navy background with rounded corners -->
  <rect width="32" height="32" rx="5" fill="#1e3a5f"/>
  <!-- Coupling constraint row — spans full width (the A₀ matrix) -->
  <rect x="3" y="3" width="26" height="7" rx="1.5" fill="#0ea5e9"/>
  <!-- Sub-problem block 1 — lower-left diagonal -->
  <rect x="3" y="13" width="12" height="16" rx="1.5" fill="#7dd3fc"/>
  <!-- Sub-problem block 2 — lower-right diagonal -->
  <rect x="17" y="13" width="12" height="16" rx="1.5" fill="#7dd3fc"/>
</svg>
